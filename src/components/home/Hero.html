<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hero</title>

<style>
  *{
    box-sizing: border-box;
    padding: 0;
    margin: 0;
  }
  .hero {
    position: relative;
    padding: 80px 5vw;
    background-image: url(../../assets/Banner.jpg);
    background-repeat: no-repeat;
    background-size: cover;
    z-index: 1;
    color: white;
}

/* 🔥 Overlay for opacity */
.hero::before {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(0, 0, 0, 0.6); /* adjust opacity here */
  z-index: -1;
}

.hero-container {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 40px;
}

/* LEFT TEXT */
.hero-content {
  flex: 1;
}

.hero-kicker {
  color: #f97316;
  font-weight: 700;
  margin-bottom: 10px;
}

.hero-title {
  font-size: clamp(40px, 5vw, 70px);
  font-weight: bold;
  line-height: 1.1;
}

.hero-subtitle {
  margin: 20px 0;
  color: #555;
  max-width: 500px;
}

/* BUTTONS */
.hero-actions {
  display: flex;
  gap: 20px;
  align-items: center;
}

.btn-primary {
  background: #f97316;
  color: white;
  padding: 12px 24px;
  border-radius: 10px;
  text-decoration: none;
}

.hero-play {
  display: flex;
  align-items: center;
  gap: 10px;
  background: none;
  border: none;
  cursor: pointer;
}

/* RIGHT IMAGE */
.hero-visual {
  flex: 1;
  display: flex;
  justify-content: center;
}

.hero-image img {
  width: 100%;
  max-width: 500px;

  /* 🔥 makes it look premium */
  filter: drop-shadow(0 20px 30px rgba(0,0,0,0.2));
}

.hero-image img {
  animation: float 3s ease-in-out infinite;
}

@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

@media (max-width: 768px) {
  .hero-container {
    flex-direction: column;
    text-align: center;
  }

  .hero-actions {
    justify-content: center;
  }

  .hero-image img {
    max-width: 350px;
  }
}
</style>
</head>

<body>

<section class="hero" id="home">
  <div class="container hero-container">

    <div class="hero-content">
      <p class="hero-kicker">RIDE ANYTIME, ANYWHERE</p>

      <h1 class="hero-title">
        Ride, explore<br>
        and feel the road<br>
        like never before
      </h1>

      <p class="hero-subtitle">
        Discover bikes near you and start your journey with ease.
        Fast booking, affordable prices, and seamless experience.
      </p>

      <div class="hero-actions">
        <a href="#" class="btn btn-primary">Book Now</a>

        <button class="hero-play">
          <span class="play-icon">▶</span>
          <span>Watch Demo</span>
        </button>
      </div>
    </div>
  </div>
</section>

</body>
</html>
